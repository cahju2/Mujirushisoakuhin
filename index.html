<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無印SMP</title>
    
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="canvas">
        <div class="header-text">
            <div class="main-title">
                <p>無印であり</p>
                <p>粗悪品です</p>
            </div>
            <span class="copyright">INZW©</span>
            
            <p class="description">
                みんなが見慣れた景色を、ほんの少しのアイデアで最先端のクリエイティブに変えてしまう粗悪なマルチプレイサーバー
            </p>

            <div class="links-wrapper">
                <a href="wiki/" class="action-link">→ サーバールール / Wiki を見る</a>
                <a href="https://discord.gg/66eZGrNJRh" target="_blank" class="action-link">→ 公式Discordサーバーに参加する</a>
            </div>
        </div>

        <div class="ip-container">
            <div class="ip-row">
                <div class="ip-label">Java:</div>
                <div class="ip-box-wrapper">
                    <span class="ip-address" id="javaIp">chinpo.hanyuu.lol</span>
                    <button class="copy-btn" onclick="copyText('javaIp')">コピー</button>
                </div>
            </div>

            <div class="ip-row">
                <div class="ip-label">BE:</div>
                <div class="ip-box-wrapper">
                    <span class="ip-address" id="beIp">be.hanyuu.lol</span>
                    <button class="copy-btn" onclick="copyText('beIp')">コピー</button>
                </div>
                <span class="port-label">Port: 19132</span>
            </div>
        </div>
    </div>

    <div class="toast-message" id="toast">コピーしました！</div>

    <script src="script.js"></script>
</body>
</html>
